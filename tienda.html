<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERCH | MYOOZ InC</title>
    <meta name="description" content="Merchandising exclusivo de MYOOZ InC. Jerseys, hoodies y accesorios de edición limitada.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD&disable-funding=credit,paylater"></script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="merch.css">
    <style>
        .tienda-hero {
            padding: 120px 0 40px;
            text-align: center;
            position: relative;
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            position: sticky;
            top: 110px;
            z-index: 100;
            padding: 6px;
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 100px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--glass-border);
        }



        .filter-btn {
            padding: 10px 24px;
            border-radius: 100px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            color: rgba(255, 255, 255, 0.75);
        }

        .filter-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.18);
        }

        @media (max-width: 768px) {
            .category-filter {
                width: 90%;
                overflow-x: auto;
                justify-content: flex-start;
                padding: 10px 15px;
                border-radius: 100px;
                top: 90px;
                flex-wrap: nowrap;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
            }
            .filter-btn {
                padding: 8px 20px;
                flex: 0 0 auto;
            }
        }

        /* Payment Modal */
        #payment-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 20000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--purple-core), var(--purple-glow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-modal {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 12px 30px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>

<body>
    <!-- Navigation loaded by navigation.js -->

    <div class="container">
        <section class="tienda-hero">
            <h1>MERCH</h1>
            <p class="subtitle">Colección Oficial MYOOZ InC</p>
        </section>

        <!-- Category Filter Bar -->
        <div class="category-filter">
            <button class="filter-btn active" onclick="filterProducts('all')">Todos</button>
            <button class="filter-btn" onclick="filterProducts('MYOOZ InC')">MYOOZ InC</button>
            <button class="filter-btn" onclick="filterProducts('GGB Beats')">GGB Beats</button>
            <button class="filter-btn" onclick="filterProducts('Joss')">Joss</button>
            <button class="filter-btn" onclick="filterProducts('Rasta Mia')">Rasta Mia</button>
        </div>

        <div id="products-grid" class="products-grid">
            <!-- Products injected by JS -->
        </div>

        <section class="glass-card" style="text-align: center; margin-top: 4rem;">
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 1.1rem;">
                ¿Necesitas ayuda con tu pedido?
            </p>
            <a href="index.html#contactForm" class="btn">Soporte al Cliente</a>
        </section>
    </div>

    <!-- Floating Cart Button -->
    <button class="floating-cart-btn" onclick="toggleCart()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#fff;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <div id="cart-count" class="cart-count">0</div>
    </button>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h2 style="font-size:1.5rem; font-weight:800; text-transform:uppercase;">Tu Carrito</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        
        <div id="cart-items" class="cart-items">
            <!-- Cart items injected here -->
        </div>

        <div class="cart-footer">
            <div class="cart-total" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; margin-top: auto;">
                <span>TOTAL</span>
                <span id="cart-total-display">$0.00</span>
            </div>

            <button id="checkout-continue-btn" class="add-to-cart-btn" style="margin-top: 1.5rem; width: 100%; padding: 16px; font-size: 1rem;" onclick="processShopifyCheckout()">PROCEDER AL PAGO (PAGO SEGURO)</button>
        </div>
    </div>

    <!-- Modal Success -->
    <div id="payment-modal">
        <div class="modal-content">
            <h2 id="modal-title">¡Pedido Recibido!</h2>
            <p id="modal-body">Gracias por tu compra. Pronto recibirás un correo con los detalles del envío.</p>
            <button class="close-modal" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shopify-buy@2.12.1/index.umd.min.js"></script>
    <script src="merch-renderer.js"></script>
    <script>
        let currentCategory = 'all';
        let cart = JSON.parse(localStorage.getItem('myooz_cart')) || [];
        let shopifyCheckoutId = localStorage.getItem('shopify_checkout_id');

        // Inicializar Checkout de Shopify persistente
        async function getOrCreateCheckout() {
            if (shopifyCheckoutId) {
                try {
                    const checkout = await shopifyClient.checkout.fetch(shopifyCheckoutId);
                    if (checkout.completedAt) {
                        localStorage.removeItem('shopify_checkout_id');
                        localStorage.removeItem('myooz_cart');
                        cart = [];
                        return await shopifyClient.checkout.create();
                    }
                    return checkout;
                } catch(e) {
                    return await shopifyClient.checkout.create();
                }
            }
            const newCheckout = await shopifyClient.checkout.create();
            localStorage.setItem('shopify_checkout_id', newCheckout.id);
            return newCheckout;
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('open');
            renderCart();
        }

        window.addItemToCart = function(product, variant) {
            cart.push({
                uniqueId: Date.now() + Math.random(),
                id: product.id,
                name: product.name,
                price: product.price,
                variantId: variant.id,    // Shopify Base Variant ID
                variantName: variant.label,
                image: product.image
            });
            saveCart();
            updateCartUI();
            
            // Show feedback
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '¡AÑADIDO!';
            btn.style.background = '#00ff88';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '';
            }, 1000);
        };

        function removeFromCart(uniqueId) {
            cart = cart.filter(item => item.uniqueId !== uniqueId);
            saveCart();
            renderCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem('myooz_cart', JSON.stringify(cart));
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total-display');
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:3rem;">Tu carrito está vacío</p>';
                totalDisplay.innerText = '$0.00';
                document.getElementById('checkout-continue-btn').style.display = 'none';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" class="cart-item-img">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-variant">${item.variantName}</div>
                        <div class="cart-item-price">$${item.price.toFixed(2)}</div>
                    </div>
                    <div class="remove-item" onclick="removeFromCart(${item.uniqueId})">Eliminar</div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalDisplay.innerText = '$' + total.toFixed(2);
            document.getElementById('checkout-continue-btn').style.display = 'block';
        }

        async function processShopifyCheckout() {
            const btn = document.getElementById('checkout-continue-btn');
            btn.innerText = 'CONECTANDO A SHOPIFY...';
            btn.style.opacity = '0.5';
            btn.disabled = true;

            try {
                const checkout = await getOrCreateCheckout();
                
                // Limpiar carrito en shopify si ya tenía elementos (en caso de reintento)
                if (checkout.lineItems.length > 0) {
                    await shopifyClient.checkout.removeLineItems(checkout.id, checkout.lineItems.map(l => l.id));
                }

                // Agrupar items por variantes (para sumar cantidades)
                const lineItemsToAdd = [];
                const variantCounts = {};
                for (let item of cart) {
                    variantCounts[item.variantId] = (variantCounts[item.variantId] || 0) + 1;
                }
                
                for (const [vId, qty] of Object.entries(variantCounts)) {
                    lineItemsToAdd.push({ variantId: vId, quantity: qty });
                }

                const updatedCheckout = await shopifyClient.checkout.addLineItems(checkout.id, lineItemsToAdd);
                
                // Redirigir al cliente a pagar seguro en Shopify
                window.location.href = updatedCheckout.webUrl;
            } catch (err) {
                console.error("Error creating Shopify checkout", err);
                btn.innerText = 'Error. Intenta de nuevo.';
                setTimeout(() => {
                    btn.innerText = 'PROCEDER AL PAGO (PAGO SEGURO)';
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }, 3000);
            }
        }



        function filterProducts(category) {
            currentCategory = category;
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => {
                const label = b.innerText.trim().toLowerCase();
                const expected = (category === 'all' ? 'todos' : category.toLowerCase());
                if (label === expected) {
                    b.classList.add('active');
                } else {
                    b.classList.remove('active');
                }
            });
            renderMerchGrid('products-grid', category);
        }

        function showModal(title, body) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('payment-modal').style.display = 'none';
        }

        window.addEventListener('load', () => {
            renderMerchGrid('products-grid', 'all');
            updateCartUI();
        });
    </script>
</body>
</html>
