    <style>
        .tienda-hero {
            padding: 120px 0 40px;
            text-align: center;
            position: relative;
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            position: sticky;
            top: 110px;
            z-index: 100;
            padding: 6px;
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--glass-border);
        }



        .filter-btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            color: rgba(255, 255, 255, 0.75);
        }

        .filter-btn.active {
            background: transparent;
            color: #fff;
            border: 1px solid #300359;
        }

        @media (max-width: 768px) {
            .tienda-hero {
                padding: 90px 0 20px;
            }
            .category-filter {
                width: 92%;
                overflow-x: auto;
                justify-content: flex-start;
                padding: 8px 10px;
                border-radius: 8px;
                top: 75px;
                flex-wrap: nowrap;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
                margin-bottom: 2rem;
            }
            .filter-btn {
                padding: 10px 18px;
                flex: 0 0 auto;
                min-height: 44px;
                font-size: 0.75rem;
            }
            .modal-content {
                padding: 1.5rem;
                border-radius: 20px;
            }
        }

        /* Payment Modal */
        #payment-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 20000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--purple-core), var(--purple-glow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-modal {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: #fff;
            color: #000;
        }

    <div class="container">
        <section class="tienda-hero">
            <h1>MERCH</h1>
            <p class="subtitle">Colección Oficial MYOOZ InC</p>
        </section>

        <!-- Category Filter Bar -->
        <div class="category-filter">
            <button class="filter-btn active" onclick="filterProducts('all')">Todos</button>
            <button class="filter-btn" onclick="filterProducts('MYOOZ InC')">MYOOZ InC</button>
            <button class="filter-btn" onclick="filterProducts('GGB Beats')">GGB Beats</button>
            <button class="filter-btn" onclick="filterProducts('Joss')">Joss</button>
            <button class="filter-btn" onclick="filterProducts('Rasta Mia')">Rasta Mia</button>
        </div>

        <div id="products-grid" class="products-grid">
            <!-- Products injected by JS -->
        </div>

        <section class="glass-card" style="text-align: center; margin-top: 4rem;">
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 1.1rem;">
                ¿Necesitas ayuda con tu pedido?
            </p>
            <a href="index.html#contactForm" class="btn">Soporte al Cliente</a>
        </section>
    </div>

    <script src="navigation.js"></script>
    <script src="merch-renderer.js"></script>
    <script src="cart-manager.js"></script>
    <script>
        let currentCategory = 'all';

        function filterProducts(category) {
            currentCategory = category;
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => {
                const label = b.innerText.trim().toLowerCase();
                const target = category.toLowerCase();
                if (label === target || (label === 'todos' && target === 'all')) {
                    b.classList.add('active');
                } else {
                    b.classList.remove('active');
                }
            });
            renderMerchGrid('products-grid', category);
        }

        function showModal(title, body) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('payment-modal').style.display = 'none';
        }

        window.addEventListener('load', () => {
            renderMerchGrid('products-grid', 'all');
            // updateCartUI is called by cart-manager.js on load
        });
    </script>
</body>
