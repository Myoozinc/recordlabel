<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERCH | MYOOZ InC</title>
    <meta name="description" content="Merchandising exclusivo de MYOOZ InC. Jerseys, hoodies y accesorios de edición limitada.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="merch.css">
    <style>
        .tienda-hero {
            padding: 120px 0 40px;
            text-align: center;
            position: relative;
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            position: sticky;
            top: 110px;
            z-index: 100;
            padding: 10px;
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 100px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--glass-border);
        }

        .filter-btn {
            padding: 10px 24px;
            border-radius: 100px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            color: #fff;
        }

        .filter-btn.active {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 10px 20px rgba(48, 3, 89, 0.3);
        }

        @media (max-width: 768px) {
            .category-filter {
                width: 90%;
                overflow-x: auto;
                justify-content: flex-start;
                padding: 10px 15px;
                border-radius: 100px;
                top: 90px;
                flex-wrap: nowrap;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
            }
            .filter-btn {
                padding: 8px 20px;
                flex: 0 0 auto;
            }
        }

        /* Payment Modal */
        #payment-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 20000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-modal {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 12px 30px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>

<body>
    <!-- Navigation loaded by navigation.js -->

    <div class="container">
        <section class="tienda-hero">
            <h1>MERCH</h1>
            <p class="subtitle">Colección Oficial MYOOZ InC</p>
        </section>

        <!-- Category Filter Bar -->
        <div class="category-filter">
            <button class="filter-btn active" onclick="filterProducts('all')">Todos</button>
            <button class="filter-btn" onclick="filterProducts('MYOOZ InC')">MYOOZ InC</button>
            <button class="filter-btn" onclick="filterProducts('GGB Beats')">GGB Beats</button>
            <button class="filter-btn" onclick="filterProducts('Joss')">Joss</button>
            <button class="filter-btn" onclick="filterProducts('Rasta Mia')">Rasta Mia</button>
        </div>

        <div id="products-grid" class="products-grid">
            <!-- Products injected by JS -->
        </div>

        <section class="glass-card" style="text-align: center; margin-top: 4rem;">
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 1.1rem;">
                ¿Necesitas ayuda con tu pedido?
            </p>
            <a href="index.html#contactForm" class="btn">Soporte al Cliente</a>
        </section>
    </div>

    <!-- Modal Success -->
    <div id="payment-modal">
        <div class="modal-content">
            <h2 id="modal-title">¡Pedido Recibido!</h2>
            <p id="modal-body">Gracias por tu compra. Pronto recibirás un correo con los detalles del envío.</p>
            <button class="close-modal" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script src="merch-data.js"></script>
    <script src="merch-renderer.js"></script>
    <script>
        let currentCategory = 'all';

        function filterProducts(category) {
            currentCategory = category;
            
            // Update buttons
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => {
                const label = b.innerText.trim();
                const expected = (category === 'all' ? 'Todos' : category);
                if (label === expected) b.classList.add('active');
                else b.classList.remove('active');
            });

            renderMerchGrid('products-grid', category);
        }

        function showModal(title, body) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('payment-modal').style.display = 'none';
        }

        window.addEventListener('load', () => {
            renderMerchGrid('products-grid', 'all');
        });
    </script>
</body>

</html>
