<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodbycarrot | MYOOZ InC</title>
    <meta name="description" content="Prodbycarrot — Productor MYOOZ InC. Beats, licencias, servicios.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { overflow-x: hidden; }
        .container { margin-top: 0; padding-top: 0; }
        .hero-section { position: relative; width: 100%; min-height: 85vh; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; padding-bottom: 4rem; }
        .hero-bg { position: absolute; inset: 0; background: #050505; display: flex; align-items: center; justify-content: center; }
        .hero-bg img { width: 65%; height: 65%; object-fit: contain; opacity: 0.25; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(5,5,5,0.1) 0%, rgba(5,5,5,0.5) 55%, rgba(5,5,5,1) 100%); }
        .hero-purple-light { position: absolute; top: 35%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(48,3,89,0.5) 0%, transparent 70%); pointer-events: none; }
        .hero-content { position: relative; z-index: 2; text-align: center; padding: 0 2rem; }
        .artist-name {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800; text-transform: uppercase; letter-spacing: -3px; line-height: 0.9; margin-bottom: 1.5rem;
            background: linear-gradient(180deg, #fff 30%, rgba(255, 255, 255, 0.2) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: nameReveal 0.8s ease 0.4s both;
        }
        @keyframes nameReveal { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .hero-socials { display: flex; gap: 1rem; justify-content: center; animation: nameReveal 0.8s ease 0.7s both; }
        .talent-content { max-width: 1000px; margin: 0 auto; padding: 4rem 2rem 6rem; }
        .content-section { margin-bottom: 4rem; }
        .video-grid{display:flex;gap:1rem;overflow-x:auto;scrollbar-width:none;padding-bottom:0.5rem;}
        .video-grid::-webkit-scrollbar{display:none;}
        .video-item{flex:0 0 80vw;max-width:560px;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:rgba(255,255,255,0.02);}
        .video-item iframe { width: 100%; height: 100%; border: none; display: block; }
        .video-placeholder { display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.1); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
        .music-embed { border-radius: 8px; overflow: hidden; }
        .music-embed iframe { width: 100%; border: none; border-radius: 8px; display: block; }
        .licences-embed { border-radius: 8px; overflow: hidden; }
        .licences-embed iframe { width: 100%; border: none; border-radius: 8px; display: block; min-height: 500px; }
        .bio-text { color: var(--text-secondary); line-height: 1.9; font-size: 1rem; max-width: 720px; }
        .nav-back { display: inline-flex; align-items: center; gap: 0.5rem; padding: 10px 24px; border: 1px solid var(--glass-border); border-radius: 100px; color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; }
        .nav-back:hover { border-color: var(--purple-core); color: var(--text-white); }
        .merch-scroll{display:flex;gap:1rem;overflow-x:auto;scrollbar-width:none;padding-bottom:0.5rem;}
        .merch-scroll::-webkit-scrollbar{display:none;}
        .merch-item{flex:0 0 200px;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.02);border:1px solid var(--glass-border);text-decoration:none;color:var(--text-white);transition:border-color 0.3s,box-shadow 0.3s;display:block;}
        .merch-item:hover{border-color:var(--purple-core);box-shadow:0 0 20px rgba(48,3,89,0.35);}
        .merch-img{width:100%;aspect-ratio:1;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.08);font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;overflow:hidden;}
        .merch-img img{width:100%;height:100%;object-fit:cover;}
        .merch-name{padding:0.8rem;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);}
        @media (max-width: 600px) { .video-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- Header will be loaded here by navigation.js -->
    <section class="hero-section">
        <div class="hero-bg"><img src="prodbycarrot.png" alt="Prodbycarrot"></div>
        <div class="hero-overlay"></div>
        <div class="hero-purple-light"></div>
        <div class="hero-content">
            <h1 class="artist-name">Prodbycarrot</h1>
            <div class="hero-socials">
                <a href="https://youtube.com/@prodbycarrot" class="social-icon" target="_blank"><img src="youtube-logo.png" alt="YouTube"></a>
                <a href="https://open.spotify.com/artist/4bf9RsfJ9haXq2SJvzJtZU" class="social-icon" target="_blank"><img src="spotify-logo.png" alt="Spotify"></a>
                <a href="https://instagram.com/prodbycarrot" class="social-icon" target="_blank"><img src="instagram-logo.png" alt="Instagram"></a>
            </div>
        </div>
    </section>

    <div class="talent-content">
        <!-- VIDEO -->
        <div class="content-section">
            <div class="video-grid">
                <div class="video-item"><iframe src="https://www.youtube.com/embed?listType=user_uploads&list=prodbycarrot" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
                <div class="video-item video-placeholder">Próximamente</div>
                <div class="video-item video-placeholder">Próximamente</div>
                <div class="video-item video-placeholder">Próximamente</div>
            </div>
        </div>

        <!-- MUSIC -->
        <div class="content-section">
            <div class="music-embed">
                <iframe src="https://open.spotify.com/embed/artist/4bf9RsfJ9haXq2SJvzJtZU?utm_source=generator&theme=0" height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>

        <!-- MERCH -->
        <div class="content-section">
            <div class="merch-scroll">
                <a href="#" class="merch-item"><div class="merch-img">Próximamente</div><div class="merch-name">Item</div></a>
                <a href="#" class="merch-item"><div class="merch-img">Próximamente</div><div class="merch-name">Item</div></a>
                <a href="#" class="merch-item"><div class="merch-img">Próximamente</div><div class="merch-name">Item</div></a>
                <a href="#" class="merch-item"><div class="merch-img">Próximamente</div><div class="merch-name">Item</div></a>
            </div>
        </div>

        <!-- LICENCES (Beatstars) -->
        <div class="content-section">
            <div class="licences-embed">
                <iframe src="https://player.beatstars.com/?storeId=prodbycarrot" loading="lazy"></iframe>
            </div>
        </div>

        <!-- BIO -->
        <div class="content-section">
            <p class="bio-text">Productor con identidad sonora única. Prodbycarrot construye mundos sónicos desde cero — trap, urbano, experimental. Cada beat es un universo propio.</p>
        </div>

        <a href="productores.html" class="nav-back">← Nuestros Productores</a>
    </div>

    <!-- Footer will be loaded here by navigation.js -->
    <script src="navigation.js"></script>
</body>
</html>
