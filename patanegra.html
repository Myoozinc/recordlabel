<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pata Negra | MYOOZ InC</title>
    <meta name="description" content="Pata Negra — Productor MYOOZ InC.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body{overflow-x:hidden;}.container{margin-top:0;padding-top:0;}
        .hero-section{position:relative;width:100%;min-height:85vh;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;padding-bottom:4rem;}
        .hero-bg{position:absolute;inset:0;background:#050505;display:flex;align-items:center;justify-content:center;}
        .hero-bg img{width:65%;height:65%;object-fit:contain;opacity:0.25;}
        .hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,5,5,0.1) 0%,rgba(5,5,5,0.5) 55%,rgba(5,5,5,1) 100%);}
        .hero-purple-light{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(48,3,89,0.5) 0%,transparent 70%);pointer-events:none;}
        .hero-content{position:relative;z-index:2;text-align:center;padding:0 2rem;}
        .artist-name{font-family:'Outfit',sans-serif;font-size:clamp(3rem,10vw,8rem);font-weight:800;text-transform:uppercase;letter-spacing:-3px;line-height:0.9;margin-bottom:1.5rem;background:linear-gradient(180deg,#fff 30%,rgba(255,255,255,0.2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:nameReveal 0.8s ease 0.4s both;}
        @keyframes nameReveal{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
        .hero-socials{display:flex;gap:1rem;justify-content:center;animation:nameReveal 0.8s ease 0.7s both;}
        .talent-content{max-width:1000px;margin:0 auto;padding:4rem 2rem 6rem;}
        .content-section{margin-bottom:4rem;}
        .video-grid{display:flex;gap:1rem;overflow-x:auto;scrollbar-width:none;padding-bottom:0.5rem;}
        .video-grid::-webkit-scrollbar{display:none;}
        .video-item{flex:0 0 80vw;max-width:560px;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:rgba(255,255,255,0.02);}
        .video-item iframe{width:100%;height:100%;border:none;display:block;}
        .video-placeholder{display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.1);font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;}
        .music-embed{border-radius:8px;overflow:hidden;}
        .music-embed iframe{width:100%;border:none;border-radius:8px;display:block;}
        .licences-embed{border-radius:8px;overflow:hidden;}
        .licences-embed iframe{width:100%;border:none;border-radius:8px;display:block;min-height:500px;}
        .bio-text{color:var(--text-secondary);line-height:1.9;font-size:1rem;max-width:720px;}
        .nav-back{display:inline-flex;align-items:center;gap:0.5rem;padding:10px 24px;border:1px solid var(--glass-border);border-radius:100px;color:var(--text-secondary);text-decoration:none;font-size:0.8rem;text-transform:uppercase;letter-spacing:2px;transition:all 0.3s;}
        .nav-back:hover{border-color:var(--purple-core);color:var(--text-white);}
        @media(max-width:600px){.video-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <!-- Header will be loaded here by navigation.js -->
    <section class="hero-section">
        <div class="hero-bg"><img src="patanegra-logo.png" alt="Pata Negra"></div>
        <div class="hero-overlay"></div>
        <div class="hero-purple-light"></div>
        <div class="hero-content">
            <h1 class="artist-name">Pata Negra</h1>
            <div class="hero-socials">
                <a href="https://youtube.com/@gatopatanegra" class="social-icon" target="_blank"><img src="youtube-logo.png" alt="YouTube"></a>
                <a href="https://open.spotify.com/artist/2ApQZKGc7NaGfTWIDwAGnG" class="social-icon" target="_blank"><img src="spotify-logo.png" alt="Spotify"></a>
                <a href="https://instagram.com/gatodepatanegra" class="social-icon" target="_blank"><img src="instagram-logo.png" alt="Instagram"></a>
            </div>
        </div>
    </section>

    <div class="talent-content">
        <div class="content-section">
            <div class="video-grid">
                <div class="video-item"><iframe src="https://www.youtube.com/embed/RTt6GhVK7qA" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
                <div class="video-item"><iframe src="https://www.youtube.com/embed/YkU1BaeMOPw" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
                <div class="video-item"><iframe src="https://www.youtube.com/embed/GNkAF5C5UNQ" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
            </div>
        </div>
        <div class="content-section">
            <div class="music-embed">
                <iframe src="https://open.spotify.com/embed/artist/2ApQZKGc7NaGfTWIDwAGnG?utm_source=generator&theme=0" height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>

        <div class="content-section">
        <div class="content-section">

        </div>
        <a href="productores.html" class="nav-back">← Nuestros Productores</a>
    </div>

    <!-- Footer will be loaded here by navigation.js -->
    <script src="navigation.js"></script>
</body>
</html>
