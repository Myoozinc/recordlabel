<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Voices | MYOOZ InC</title>
    <meta name="description" content="Los Artistas de MYOOZ InC. Las voces que definen nuestra identidad musical.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Purple Bloom entrance */
        #bloom-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(48, 3, 89, 0.85) 0%, rgba(5, 5, 5, 0.4) 60%, transparent 100%);
            z-index: 9000;
            pointer-events: none;
            animation: bloomFade 0.9s ease forwards;
        }
        @keyframes bloomFade {
            0%   { opacity: 1; }
            100% { opacity: 0; }
        }

        .container { margin-top: 120px; }

        .page-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .page-subheader {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 5rem;
        }

        /* Roster Grid */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin: 0 auto;
            max-width: 900px;
        }

        /* Card - 12px rule */
        .artist-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-white);
            display: block;
            /* Staggered reveal start state */
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .artist-card.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        .artist-card:hover {
            border-color: var(--purple-core);
            box-shadow: 0 0 40px rgba(48, 3, 89, 0.6), 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
            background: #0a0a0a;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.6s ease;
        }

        .artist-card:hover .card-image img {
            transform: scale(1.04);
        }

        /* Purple light on hover overlay */
        .card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(48, 3, 89, 0.5) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .artist-card:hover .card-image::after {
            opacity: 1;
        }

        .card-content {
            padding: 1.5rem 2rem;
        }

        .card-content h2 {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 0.6rem;
            background: linear-gradient(180deg, var(--purple-glow) 0%, var(--purple-core) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-content p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .card-arrow {
            display: inline-block;
            margin-top: 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--purple-glow);
            opacity: 0;
            transform: translateX(-8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .artist-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .roster-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <!-- Purple Bloom entrance -->
    <div id="bloom-overlay"></div>

    <!-- Header will be loaded here by navigation.js -->

    <div class="container">
        <div class="page-header">
            <h1 class="section-title">The Voices</h1>
        </div>
        <p class="page-subheader">Los Artistas · MYOOZ InC</p>

        <div class="roster-grid">

            <a href="rasta-mia.html" class="artist-card" id="card-0">
                <div class="card-image">
                    <img src="rasta-mia.png" alt="Rasta Mia">
                </div>
                <div class="card-content">
                    <h2>Rasta Mia</h2>
                    <p>Cantautora del Norte de Francia. Versatilidad musical entre dancehall, latino, pop y más géneros.</p>
                    <span class="card-arrow">Entrar al mundo →</span>
                </div>
            </a>

            <a href="joss.html" class="artist-card" id="card-1">
                <div class="card-image">
                    <img src="joss.png" alt="JOSS">
                </div>
                <div class="card-content">
                    <h2>JOSS</h2>
                    <p>Cantante y compositor de Venezuela. R&B y Rock con voz dulce y letras emotivas.</p>
                    <span class="card-arrow">Entrar al mundo →</span>
                </div>
            </a>

        </div>
    </div>

    <!-- Footer will be loaded here by navigation.js -->

    <script src="navigation.js"></script>
    <script>
        // Staggered card reveal
        const cards = document.querySelectorAll('.artist-card');
        cards.forEach((card, i) => {
            setTimeout(() => card.classList.add('revealed'), 200 + i * 160);
        });

        // Purple Bloom on outbound nav links
        document.querySelectorAll('.artist-card').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const href = this.getAttribute('href');
                const overlay = document.getElementById('bloom-overlay');
                overlay.style.animation = 'none';
                overlay.style.opacity = '1';
                setTimeout(() => { window.location.href = href; }, 400);
            });
        });
    </script>
</body>
</html>
