    <style>
        .page-header {
            text-align: center;
            padding: 100px 2rem 3rem;
        }

        .roster-panels { width: 100%; }

        .talent-panel {
            display: block;
            position: relative;
            width: 100%;
            height: 45vh;
            min-height: 320px;
            overflow: hidden;
            text-decoration: none;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .talent-panel:last-child { border-bottom: 1px solid rgba(255, 255, 255, 0.04); }

        .panel-bg { position: absolute; inset: 0; }
        .panel-bg img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center 25%;
            filter: saturate(0.2) brightness(0.4);
            transform: scale(1.06);
            transition: transform 0.8s ease, filter 0.6s ease;
        }

        /* Specific focal points for producers with high faces */
        .talent-panel[href="/prodbycarrot/"] img { object-position: center 15%; }

        .talent-panel:hover .panel-bg img {
            transform: scale(1);
            filter: saturate(0.4) brightness(0.55);
        }

        .panel-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(90deg, rgba(5,5,5,0.88) 0%, rgba(5,5,5,0.5) 45%, rgba(5,5,5,0.05) 100%);
        }
        .talent-panel.reverse .panel-overlay {
            background: linear-gradient(270deg, rgba(5,5,5,0.88) 0%, rgba(5,5,5,0.5) 45%, rgba(5,5,5,0.05) 100%);
        }

        .panel-content {
            position: relative; z-index: 2;
            height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 7%;
        }
        .talent-panel.reverse .panel-content { align-items: flex-end; text-align: right; }

        /* Purple gradient — bottom-up */
        .panel-name {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 800; text-transform: uppercase; letter-spacing: -1px; line-height: 1; margin-bottom: 0.5rem;
            background: linear-gradient(180deg, #8B3FCC 0%, #300359 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            transition: filter 0.4s ease;
        }
        .talent-panel:hover .panel-name { filter: brightness(1.3); }

        .panel-tagline { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 1.2rem; }

        .panel-cta {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 700;
            color: #300359;
            opacity: 0; transform: translateX(-12px);
            transition: opacity 0.4s ease 0.1s, transform 0.4s ease 0.1s;
        }
        .talent-panel.reverse .panel-cta { transform: translateX(12px); }
        .talent-panel:hover .panel-cta { opacity: 1; transform: translateX(0); color: #300359; }

        @media (max-width: 600px) {
            .page-header {
                padding: 85px 1.5rem 2rem;
            }
            .talent-panel {
                height: 45vh;
                min-height: 260px;
            }
            .panel-content {
                padding: 0 5%;
            }
            .panel-name {
                font-size: clamp(1.8rem, 8vw, 2.8rem);
            }
            .panel-tagline {
                font-size: 0.7rem;
                letter-spacing: 2px;
                margin-bottom: 1rem;
            }
            /* Show CTA on mobile (no hover) */
            .panel-cta {
                opacity: 0.7;
                transform: translateX(0);
                font-size: 0.65rem;
            }
        }
    </style>
