<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios | MYOOZ InC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="merch.css">

    <style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --purple-glow: #8B3FCC;
            --deep-purple: #300359;
        }

        body {
            background-color: #050505;
            color: var(--text-white);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden; 
        }

        .container {
            margin-top: 120px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
        }

        /* 1. Centered Header Layout */
        .page-header.main-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0;
        }

        .subtitle {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* 2. Buttons Aligned to Right */
        .action-btn-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
            gap: 0.8rem;
            margin-bottom: 5rem;
            width: 100%;
        }

        /* 3. Cart Drawer Fix (Zero Overflow) */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -100%; /* Completely off-screen */
            width: 450px;
            max-width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 21000;
            box-shadow: -20px 0 60px rgba(0,0,0,0.8);
            transition: right 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--glass-border);
        }

        .cart-drawer.open {
            right: 0;
        }

        /* Services Grid Styling */
        .service-section {
            margin-bottom: 8rem;
        }

        .purple-title {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--deep-purple);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .service-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem 4rem;
            margin-top: 4rem;
        }

        .service-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .service-item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
        }

        .service-price {
            font-size: 1.35rem;
            font-weight: 800;
            background: linear-gradient(0deg, #300359 0%, #8b3fcc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-outline-custom, .promo-trigger-btn {
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            border-radius: 100px;
            transition: 0.3s;
            text-align: center;
        }

        .btn-outline-custom {
            background: transparent;
            color: #8B3FCC; 
            padding: 0.75rem 2.2rem;
            font-size: 0.85rem;
            border: 1px solid rgba(139, 63, 204, 0.9);
        }

        .promo-trigger-btn {
            background: var(--deep-purple);
            color: #fff;
            border: none;
            padding: 1rem 2.8rem;
        }

        @media screen and (max-width: 900px) {
            .service-list { grid-template-columns: 1fr; }
            .action-btn-container { align-items: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header main-header">
        <h1>Servicios</h1>
        <p class="subtitle">Audiovisuales</p>
    </div>

    <div class="action-btn-container">
        <button class="promo-trigger-btn" onclick="openPromosModal()">
            Ver Paquetes Promocionales
        </button>
        <button class="btn-outline-custom" onclick="openModal()">Solicitar servicios</button>
    </div>

    <section class="service-section">
        <h2 class="purple-title">Estudio de Audio</h2>
        <div class="service-list">
            <div class="service-item">
                <div class="service-item-header"><h3>Mix</h3><span class="service-price">$150</span></div>
                <p class="service-desc">Balanceo perfecto, EQ y compresión profesional.</p>
            </div>
            <div class="service-item">
                <div class="service-item-header"><h3>Master</h3><span class="service-price">$150</span></div>
                <p class="service-desc">El pulido final para un sonido comercial.</p>
            </div>
        </div>
    </section>

    <section class="service-section">
        <h2 class="purple-title">Estudio Visual</h2>
        <div class="service-list">
            <div class="service-item">
                <div class="service-item-header"><h3>Videoclip IA</h3><span class="service-price">$350</span></div>
                <p class="service-desc">Producción visual de vanguardia con Inteligencia Artificial.</p>
            </div>
        </div>
    </section>
</div>

<div class="cart-drawer" id="cart-drawer">
    <div style="padding: 2rem; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0; letter-spacing: 2px;">MI CARRITO</h3>
        <button onclick="toggleCart()" style="background:none; border:none; color:white; cursor:pointer; font-weight:800;">[X] CERRAR</button>
    </div>
    <div id="cart-items" style="flex:1; padding: 2rem;">
        </div>
</div>

<script src="navigation.js"></script>
<script src="merch-renderer.js"></script>
<script src="cart-manager.js"></script>

<script>
    /* Logic to toggle the off-screen drawer */
    function toggleCart() {
        document.getElementById('cart-drawer').classList.toggle('open');
    }

    /* Reference your existing functions from cart-manager.js */
    function openModal() {
        // This should trigger your existing service-modal logic
        if(typeof window.openServiceModal === 'function') {
            window.openServiceModal();
        } else {
            console.log("Modal function triggered");
        }
    }
</script>

</body>
</html>
